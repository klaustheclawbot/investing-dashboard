<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Investing ideas dashboard</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: rgba(18, 25, 48, 0.82);
      --panel-2: rgba(26, 35, 68, 0.9);
      --text: #eef2ff;
      --muted: #98a2c6;
      --accent: #7c9cff;
      --accent-2: #3dd9b3;
      --danger: #ff7a90;
      --border: rgba(255,255,255,0.08);
      --shadow: 0 18px 50px rgba(0,0,0,0.28);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(124,156,255,0.22), transparent 30%),
        radial-gradient(circle at top right, rgba(61,217,179,0.16), transparent 24%),
        linear-gradient(180deg, #0a0f1d 0%, #0f172c 100%);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap { max-width: 1220px; margin: 0 auto; padding: 28px; }
    .hero, .grid { display: grid; gap: 18px; }
    .hero { grid-template-columns: 1.5fr 1fr; margin-bottom: 18px; }
    .grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .panel, .card {
      background: var(--panel);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 22px;
      box-shadow: var(--shadow);
    }
    .title { font-size: 34px; font-weight: 800; letter-spacing: -0.03em; margin: 0 0 8px; }
    .muted { color: var(--muted); }
    .hero-stats { display:grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap:12px; margin-top:18px; }
    .mini { background: var(--panel-2); border: 1px solid var(--border); border-radius: 18px; padding: 14px; }
    .mini .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; }
    .mini .value { font-size: 28px; font-weight: 800; margin-top: 8px; }
    .idea-title { font-size: 22px; font-weight: 800; margin: 10px 0; }
    .pill { display:inline-block; padding:6px 10px; border-radius:999px; font-size:12px; font-weight:700; }
    .bullish { background: rgba(61,217,179,.16); color: #5cf0c7; }
    .neutral { background: rgba(124,156,255,.16); color: #9db5ff; }
    .bearish { background: rgba(255,122,144,.16); color: #ff9daf; }
    .list { margin: 0; padding-left: 18px; line-height: 1.7; }
    .line { white-space: pre-line; color: var(--text); }
    @media (max-width: 1100px) {
      .hero, .grid, .hero-stats { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap" id="app">Loading dashboard…</div>
  <script>
    async function main() {
      const res = await fetch('./data.json', { cache: 'no-store' });
      const data = await res.json();
      const app = document.getElementById('app');
      const stanceClass = s => s === 'bullish' ? 'bullish' : s === 'bearish' ? 'bearish' : 'neutral';

      app.innerHTML = `
        <section class="hero">
          <div class="panel">
            <div class="muted">Portfolio intelligence</div>
            <h1 class="title">Investing ideas dashboard</h1>
            <div class="muted">Generated at ${new Date(data.generatedAt).toLocaleString()}</div>
            <div class="hero-stats">
              <div class="mini"><div class="label">Ideas</div><div class="value">${data.summary.ideasCount}</div></div>
              <div class="mini"><div class="label">Bullish</div><div class="value">${data.summary.bullishCount}</div></div>
              <div class="mini"><div class="label">Neutral</div><div class="value">${data.summary.neutralCount}</div></div>
              <div class="mini"><div class="label">Coverage</div><div class="value">${data.summary.holdingsCovered}</div></div>
            </div>
          </div>
          <div class="panel">
            <div class="muted">Executive summary</div>
            <ul class="list">${data.summaryLines.map(line => `<li class="line">${line}</li>`).join('')}</ul>
          </div>
        </section>

        <section class="grid">
          ${data.ideas.map(idea => `
            <div class="card">
              <div class="pill ${stanceClass(idea.stance)}">${idea.stance}</div>
              <div class="idea-title">${idea.ticker}</div>
              <div class="muted">${idea.source}</div>
              <p>${idea.whyNow}</p>
              <ul class="list">
                <li>Entry: ${idea.entryPrice?.toFixed?.(2) ?? '—'}</li>
                <li>Current: ${idea.currentPrice?.toFixed?.(2) ?? '—'}</li>
                <li>Vs entry: ${idea.entryDeltaPct != null ? (idea.entryDeltaPct > 0 ? '+' : '') + idea.entryDeltaPct.toFixed(1) + '%' : '—'}</li>
                <li>Score: ${idea.score?.toFixed?.(1) ?? '—'}</li>
              </ul>
              ${idea.url ? `<p><a href="${idea.url}" target="_blank" rel="noreferrer" style="color:#9db5ff">Source link</a></p>` : ''}
            </div>
          `).join('')}
        </section>
      `;
    }
    main();
  </script>
</body>
</html>
